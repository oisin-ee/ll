name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare --activate

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Typecheck needs env vars *declared* (not set) so svelte-kit sync can
      # emit the correct types for `$env/static/private`. `.env.example` is
      # the committed schema and is sufficient.
      - name: Seed env from .env.example
        run: cp .env.example .env

      - name: Typecheck
        run: pnpm run check

      - name: Migrate test DB
        run: pnpm exec tsx scripts/migrate.ts

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Free hosted runner SSHes into the exe.dev VM. Self-hosted runners + a
      # public repo open a gap any future `pull_request`-triggered self-hosted
      # job would silently widen — this side-steps the whole class.
      - name: Deploy on exe.dev VM
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EXE_HOST }}
          username: ${{ secrets.EXE_USER }}
          key: ${{ secrets.EXE_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/exedev/ll-app
            git fetch origin main
            git reset --hard origin/main
            docker compose -p ll build
            docker compose -p ll up -d
