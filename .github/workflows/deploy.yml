name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/exedev/ll
    steps:
      - name: Pull latest
        run: git pull origin main --ff-only

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Restart service
        run: sudo systemctl restart ll
