name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy env file
        run: cp /home/exedev/ll/.env .env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy build artifacts
        run: rsync -a --delete build/ /home/exedev/ll/build/

      - name: Deploy dependencies
        run: rsync -a --delete node_modules/ /home/exedev/ll/node_modules/

      - name: Deploy migrations
        run: |
          rsync -a drizzle.config.ts /home/exedev/ll/
          rsync -a --delete drizzle/ /home/exedev/ll/drizzle/

      - name: Bootstrap migration history
        run: |
          sqlite3 /home/exedev/ll/data/ll.db "
            CREATE TABLE IF NOT EXISTS __drizzle_migrations (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              hash text NOT NULL,
              created_at numeric
            );
            INSERT INTO __drizzle_migrations (hash, created_at)
            SELECT '68e5aaf75b174f90dffa2af8f6d65080f62e7c3a34ed38c72cf1a278ee3c77fc', 1775392060310
            WHERE NOT EXISTS (SELECT 1 FROM __drizzle_migrations);
          "

      - name: Apply schema changes
        run: cd /home/exedev/ll && pnpm drizzle-kit migrate

      - name: Restart service
        run: sudo systemctl restart ll
